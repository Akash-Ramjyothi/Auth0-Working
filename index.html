<!DOCTYPE html>
<html lang="en" class="h-100">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta
      name="description"
      content="MoodWiz - Secure authentication experience powered by Auth0."
    />
    <meta name="theme-color" content="#ffffff" />

    <title>MoodWiz</title>

    <!-- Performance -->
    <link rel="preconnect" href="https://stackpath.bootstrapcdn.com" />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link rel="preconnect" href="https://use.fontawesome.com" />
    <link rel="preconnect" href="https://cdn.auth0.com" />

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />

    <!-- Highlight.js Theme -->
    <link
      rel="stylesheet"
      href="//cdnjs.cloudflare.com/ajax/libs/highlight.js/9.15.6/styles/monokai-sublime.min.css"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.7.2/css/solid.css"
      integrity="sha384-r/k8YTFqmlOaqRkZuSiE9trsrDXkh07mRaoGBMoDcmA58OHILZPsk29i2BsFng1B"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.7.2/css/fontawesome.css"
      integrity="sha384-4aon80D8rXCGx9ayDt85LbyUHeMWd3UiBaWliBlJ53yzm9hqN21A+o1pqoyK04h+"
      crossorigin="anonymous"
    />

    <!-- Auth0 Theme -->
    <link
      rel="stylesheet"
      href="https://cdn.auth0.com/js/auth0-samples-theme/1.0/css/auth0-theme.min.css"
    />

    <!-- Local Styles -->
    <link rel="stylesheet" href="/css/auth0-theme.min.css" />
    <link rel="stylesheet" href="/css/main.css" />
  </head>

  <body class="d-flex flex-column h-100 bg-light">
    <!-- ===================================================== -->
    <!-- Navigation -->
    <!-- ===================================================== -->

    <header class="nav-container shadow-sm">
      <nav class="navbar navbar-expand-md navbar-light bg-white">
        <div class="container">
          <!-- Brand -->
          <a class="navbar-brand font-weight-bold" href="/">
            MoodWiz
          </a>

          <!-- Mobile Toggle -->
          <button
            class="navbar-toggler"
            type="button"
            data-toggle="collapse"
            data-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Navbar Content -->
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto align-items-md-center">
              <!-- Desktop Login Button -->
              <li class="nav-item auth-invisible d-none d-md-block">
                <button
                  id="qsLoginBtnDesktop"
                  onclick="login()"
                  class="btn btn-primary btn-margin hidden"
                >
                  <i class="fas fa-sign-in-alt mr-2"></i>
                  Log in with Auth0
                </button>
              </li>

              <!-- Mobile Login Button -->
              <li class="nav-item auth-invisible d-md-none w-100 mt-3">
                <button
                  id="qsLoginBtnMobile"
                  onclick="login()"
                  class="btn btn-primary btn-block hidden"
                >
                  <i class="fas fa-sign-in-alt mr-2"></i>
                  Log in with Auth0
                </button>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- ===================================================== -->
    <!-- Main Content -->
    <!-- ===================================================== -->

    <main id="main-content" class="container flex-grow-1 py-5">
      <section id="content-home" class="page">
        <!-- Dynamic content renders here -->
      </section>
    </main>

    <!-- ===================================================== -->
    <!-- Footer -->
    <!-- ===================================================== -->

    <footer class="text-center py-3 bg-white border-top">
      <small class="text-muted">
        © 2026 MoodWiz. Secure authentication powered by Auth0.
      </small>
    </footer>

    <!-- ===================================================== -->
    <!-- Scripts -->
    <!-- ===================================================== -->

    <!-- jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.bundle.min.js"></script>

    <!-- Auth0 -->
    <script src="https://cdn.auth0.com/js/auth0-spa-js/1.2/auth0-spa-js.production.js"></script>

    <!-- Highlight.js -->
    <script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/9.15.6/highlight.min.js"></script>

    <!-- Theme -->
    <script src="/js/auth0-theme.min.js"></script>

    <!-- Application Scripts -->
    <script src="/js/ui.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
